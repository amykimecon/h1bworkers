run_tag: "apr2026"

build:
  overwrite: true
  control_only: true
  reuse_existing_candidate_parquets: true
  position_chunk_size: 10000
  rsid_lookup_limit: 10000
  education_event_window_years: 5
  # Year range for never-treated control school education pull (no event window).
  # Should span treated relabel years ± education_event_window_years.
  control_year_min: 2010
  control_year_max: 2024
