analysis:
  horizons: [1, 3, 5, 10]
  cap_to_latest_available_year: true
  regression_reference_event_time: -1
  # Substring filter applied to degree_raw and field_raw (case-insensitive).
  # Only education rows where at least one of those fields contains this string
  # are kept.  Set to null to disable.
  field_filter: "econ"

wrds:
  username: null
  pgpass_path: null

testing:
  enabled: false
  sample_n_schools: 3
  random_seed: 42
  school_names: []

paths:
  relabels_parquet: "{root}/data/int/int_files_nov2025/econ_relabels_v2.parquet"
  ipeds_crosswalk_parquet: "{root}/data/int/int_files_nov2025/ipeds_crosswalk_2021.parquet"
  ipeds_completions_parquet: "{root}/data/int/int_files_nov2025/ipeds_completions_all.parquet"

  event_schools_parquet: "{root}/data/int/relabel_indiv_model_event_schools_${run_tag}.parquet"
  rsid_candidates_parquet: "{root}/data/int/relabel_indiv_model_rsid_candidates_${run_tag}.parquet"
  selected_rsid_parquet: "{root}/data/int/relabel_indiv_model_selected_rsid_${run_tag}.parquet"
  matched_education_parquet: "{root}/data/int/relabel_indiv_model_education_${run_tag}.parquet"
  matched_positions_parquet: "{root}/data/int/relabel_indiv_model_positions_${run_tag}.parquet"

  # Never-treated control school outputs (parallel to treated school outputs above).
  never_treated_schools_parquet: "{root}/data/int/relabel_indiv_model_control_schools_${run_tag}.parquet"
  never_treated_rsid_candidates_parquet: "{root}/data/int/relabel_indiv_model_control_rsid_candidates_${run_tag}.parquet"
  never_treated_selected_rsid_parquet: "{root}/data/int/relabel_indiv_model_control_selected_rsid_${run_tag}.parquet"
  never_treated_education_parquet: "{root}/data/int/relabel_indiv_model_control_education_${run_tag}.parquet"
  never_treated_positions_parquet: "{root}/data/int/relabel_indiv_model_control_positions_${run_tag}.parquet"
  analysis_panel_parquet: "{root}/data/int/relabel_indiv_model_analysis_panel_${run_tag}.parquet"
  analysis_school_event_time_parquet: "{root}/data/int/relabel_indiv_model_school_event_time_${run_tag}.parquet"
  analysis_event_study_parquet: "{root}/data/int/relabel_indiv_model_analysis_event_study_${run_tag}.parquet"
  analysis_regression_event_study_parquet: "{root}/data/int/relabel_indiv_model_analysis_regression_event_study_${run_tag}.parquet"
  analysis_output_dir: "{root}/output/relabel_indiv_model/"
