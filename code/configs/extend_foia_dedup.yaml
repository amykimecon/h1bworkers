run_tag: "v1"

testing:
  enabled: false
  n_firms: 500        # rows to sample from each TRK_12704 year file when testing

h1b_raw_dir:      "{root}/data/raw/H-1B Data"
h1b_years:        [2008, 2009, 2010, 2011, 2012, 2013, 2014, 2015, 2016, 2017, 2018, 2019, 2020]

# Existing foia_firms_dedup from the Bloomberg lottery dedup run
foia_firms_dedup: "{root}/data/int/company_matching_jan28/foia_firms_dedup.csv"

output_dir:       "{root}/data/int"

# Dedup thresholds for within-TRK_12704 dedup (mirrors dedupe_foia_employers defaults)
dedup:
  strong_name:     98.0
  name_and_state:  95.0
  name_and_domain: 93.0
  name_and_naics2: 96.0
  block_prefix_len: 10
  max_block_size:   500

# Threshold to assign an *existing* foia_firm_uid vs minting a new one.
# Requires both name_similarity >= match_threshold AND same state to assign existing UID.
match_threshold: 90.0
