  merge_filt_prefilt_parquet: "{root}/data/int/merge_filt_prefilt_${run_tag}.parquet"
  merge_filt_prefilt_parquet_legacy: "{root}/data/int/merge_filt_prefilt_sep8.parquet"
  merge_filt_prefilt_sa_parquet: "{root}/data/int/merge_filt_prefilt_sa_${run_tag}.parquet"
  merge_filt_prefilt_anglo_parquet: "{root}/data/int/merge_filt_prefilt_anglo_${run_tag}.parquet"
  merge_filt_prefilt_cjk_parquet: "{root}/data/int/merge_filt_prefilt_cjk_${run_tag}.parquet"

  merge_filt_mult2_parquet: "{root}/data/int/merge_filt_mult2_${run_tag}.parquet"
  merge_filt_mult2_parquet_legacy: "{root}/data/int/merge_filt_mult2_sep8.parquet"
  merge_filt_mult4_parquet: "{root}/data/int/merge_filt_mult4_${run_tag}.parquet"
  merge_filt_mult4_parquet_legacy: "{root}/data/int/merge_filt_mult4_sep8.parquet"
  merge_filt_mult6_parquet: "{root}/data/int/merge_filt_mult6_${run_tag}.parquet"
  merge_filt_mult6_parquet_legacy: "{root}/data/int/merge_filt_mult6_sep8.parquet"

  merge_filt_strict_parquet: "{root}/data/int/merge_filt_strict_${run_tag}.parquet"
  merge_filt_us_educ_parquet: "{root}/data/int/merge_filt_us_educ_${run_tag}.parquet"
  merge_filt_us_educ_baseline_parquet: "{root}/data/int/merge_filt_us_educ_baseline_${run_tag}.parquet"

  merge_filt_us_educ_prefilt_parquet: "{root}/data/int/merge_filt_us_educ_prefilt_${run_tag}.parquet"
  merge_filt_us_educ_opt_parquet: "{root}/data/int/merge_filt_us_educ_opt_${run_tag}.parquet"
  merge_filt_strict_low_parquet: "{root}/data/int/merge_filt_strict_low_${run_tag}.parquet"
  merge_filt_strict_med_parquet: "{root}/data/int/merge_filt_strict_med_${run_tag}.parquet"
  merge_filt_strict_high_parquet: "{root}/data/int/merge_filt_strict_high_${run_tag}.parquet"

  optimal_dedup_prededup_parquet: "{root}/data/int/optimal_dedup_prededup_${run_tag}.parquet"
